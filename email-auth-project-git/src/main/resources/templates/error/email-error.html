<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ошибка Email — Java EE Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="auth-body">
<div class="auth-bg"><div class="auth-grid"></div></div>
<div class="auth-container">
    <div class="auth-card" style="text-align:center;">
        <div class="status-icon status-error">✉</div>
        <h1 class="auth-title" style="margin-top:1rem;">Ошибка отправки Email</h1>
        <p style="color:var(--text-muted);margin:1rem 0;" th:text="${error}">Не удалось отправить письмо.</p>
        <div class="code-hint" style="text-align:left;margin-bottom:1.5rem;">
            <div class="code-hint-title">// Проверьте в application.properties:</div>
            <div class="code-hint-line">spring.mail.username=your@gmail.com</div>
            <div class="code-hint-line">spring.mail.password=app-password</div>
            <div class="code-hint-line"><span class="code-kw">// Gmail: включите App Passwords</span></div>
        </div>
        <a th:href="@{/auth/register}" class="btn btn-secondary" style="display:inline-block;">← Попробовать снова</a>
    </div>
</div>
</body>
</html>
