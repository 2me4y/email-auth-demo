<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ошибка — Java EE Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="auth-body">
<div class="auth-bg"><div class="auth-grid"></div></div>
<div class="auth-container">
    <div class="auth-card" style="text-align:center;">
        <div class="status-icon status-error">500</div>
        <h1 class="auth-title" style="margin-top:1rem;">Внутренняя ошибка</h1>
        <p style="color:var(--text-muted);margin:1rem 0 2rem;" th:text="${error}">Что-то пошло не так.</p>
        <a th:href="@{/}" class="btn btn-secondary" style="display:inline-block;">← На главную</a>
    </div>
</div>
</body>
</html>
