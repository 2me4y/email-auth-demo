<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Проверьте почту — Java EE Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="auth-body">

<div class="auth-bg">
    <div class="auth-grid"></div>
</div>

<div class="auth-container">
    <div class="auth-card" style="text-align: center;">

        <div class="status-icon status-pending">✉</div>

        <h1 class="auth-title" style="margin-top: 1rem;">Проверьте почту</h1>

        <div th:if="${successMessage}" class="alert alert-success" style="text-align:left">
            <span class="alert-icon">✓</span>
            <span th:text="${successMessage}"></span>
        </div>

        <p style="color: var(--text-muted); margin: 1rem 0 2rem;">
            Мы отправили письмо с ссылкой подтверждения.<br>
            Нажмите на ссылку в письме, чтобы активировать аккаунт.
        </p>

        <div class="code-hint" style="text-align:left">
            <div class="code-hint-title">// Async процесс в фоне:</div>
            <div class="code-hint-line"><span class="code-async">Thread: Email-Async-1</span></div>
            <div class="code-hint-line">→ JavaMailSender.send()</div>
            <div class="code-hint-line">→ SMTP: smtp.gmail.com:587</div>
            <div class="code-hint-line">→ STARTTLS шифрование</div>
            <div class="code-hint-line"><span class="code-kw">CompletableFuture&lt;Void&gt;</span></div>
        </div>

        <a th:href="@{/auth/login}" class="btn btn-secondary" style="margin-top: 1.5rem; display: inline-block;">
            ← Перейти к входу
        </a>
    </div>
</div>

</body>
</html>
